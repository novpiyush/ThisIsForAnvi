<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}

body{
display:flex;justify-content:center;align-items:center;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url("bg.png") center/cover no-repeat;
color:#fff;
}

.container{
width:90%;max-width:420px;padding:26px;border-radius:22px;
background:rgba(255,182,193,.18);backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.25);
box-shadow:0 20px 40px rgba(0,0,0,.35);
text-align:center;position:relative;z-index:2;
overflow:hidden;
}

.hidden{display:none}
p{font-size:14px;line-height:1.5;margin-bottom:18px}

.option,.navBtn{
width:100%;padding:13px;margin-top:10px;border-radius:30px;
border:1px solid rgba(255,255,255,.35);
background:rgba(255,255,255,.15);
color:#fff;font-weight:600;cursor:pointer
}
.option.active,.navBtn:active{background:#fff;color:#000}

#yesBtn,#noBtn{
padding:16px 40px;border-radius:40px;font-weight:700;min-width:140px
}
#yesBtn{background:#fff;color:#000;border:none}

#noBtn{
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.35);
color:#fff;position:absolute;bottom:15px;left:50%;
transform:translateX(-50%);
transition:all .25s ease;
}

.button-zone{position:relative;height:260px}

.nav{display:flex;gap:12px}
.navBtn{width:48%}

#particles{position:fixed;inset:0;pointer-events:none;z-index:0}

.particle{
position:absolute;bottom:-40px;width:18px;height:18px;
background:linear-gradient(145deg,#ff5f9e,#ff99c8);
transform:rotate(45deg);
animation:floatUp linear forwards;
}

.particle::before,.particle::after{
content:"";
position:absolute;
width:18px;
height:18px;
background:inherit;
border-radius:50%;
}

.particle::before{top:-9px}
.particle::after{left:-9px}

@keyframes floatUp{
to{transform:translateY(-110vh) rotate(45deg);opacity:0}
}

.spark{
position:absolute;
width:4px;
height:4px;
background:#fff;
border-radius:50%;
animation:spark 1s ease-out forwards
}

@keyframes spark{
to{transform:translate(var(--x),var(--y));opacity:0}
}

.shake{animation:shake .5s ease}

@keyframes shake{
25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}
}
</style>
</head>

<body>

<audio id="clickSound" src="click.mp3"></audio>
<audio id="okSound" src="ok.mp3"></audio>
<audio id="bgm" src="pretty_bgm.mp3" loop></audio>

<div id="particles"></div>

<div class="container" id="start">
<h1>HEY PALAK</h1>
<p>I made a small game.<br>If you want to play, will you play it?</p>
<p id="extraMsg"></p>

<div class="button-zone">
<button id="yesBtn">YES</button>
<button id="noBtn">NO</button>
</div>

</div>

<div class="container hidden" id="intro">

<p>If you win the game,<br>you can give me any dare.</p>

<button id="okBtn" class="option">
OK
</button>

</div>

<div class="container hidden" id="rules">

<p>You need to win at least<br>7 out of 11 questions.</p>

<button class="option" onclick="startGame()">
Now start the game
</button>

</div>

<div class="container hidden" id="game">

<h2 id="question"></h2>

<div id="options"></div>

<div class="nav">

<button class="navBtn" id="prevBtn">
Previous
</button>

<button class="navBtn" id="nextBtn">
Okay
</button>

</div>

</div>

<div class="container hidden" id="result"></div>

<script>

const clickSound=document.getElementById("clickSound");
const okSound=document.getElementById("okSound");
const bgm=document.getElementById("bgm");

bgm.volume=.15;
/* GLOBAL BUTTON SOUNDS */

document.addEventListener("click",function(e){

if(e.target.id==="yesBtn")
clickSound.currentTime=0,clickSound.play().catch(()=>{});

if(e.target.id==="noBtn")
clickSound.currentTime=0,clickSound.play().catch(()=>{});

if(e.target.id==="prevBtn")
clickSound.currentTime=0,clickSound.play().catch(()=>{});

if(e.target.id==="nextBtn")
clickSound.currentTime=0,clickSound.play().catch(()=>{});

if(e.target.id==="okBtn")
okSound.currentTime=0,okSound.play().catch(()=>{});

if(e.target.innerText==="Restart")
clickSound.currentTime=0,clickSound.play().catch(()=>{});

if(e.target.innerText==="Try Again")
clickSound.currentTime=0,clickSound.play().catch(()=>{});

});
const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const extraMsg=document.getElementById("extraMsg");
const buttonZone=document.querySelector(".button-zone");

const noMessages=[
"I can wait...",
"Take your time, I’m not going anywhere.",
"I’ll still be right here.",
"Maybe you just need a little more time.",
"I believe you’ll choose differently.",
"I know there’s a Yes hiding somewhere.",
"Don’t worry, I’m patient.",
"I’ll wait as long as it takes.",
"Your Yes will be worth it.",
"I’m still hopeful.",
"I’ll keep choosing you.",
"It feels like you’re close to saying it.",
"I’ll be here when you’re ready.",
"No rush… just don’t forget me.",
"I have faith in your answer.",
"You can say it softly… I’ll hear it.",
"I’m waiting for that one word.",
"I know you want to press it.",
"I’ll stop moving when you say Yes."
];

let noClicks=0;

noBtn.onclick=()=>{

clickSound.play().catch(()=>{});

if(noClicks<noMessages.length){
extraMsg.innerText=noMessages[noClicks++];
}else{
extraMsg.innerText="I’m still waiting for your Yes.";
}

const btnWidth=noBtn.offsetWidth;
const btnHeight=noBtn.offsetHeight;
const zoneRect=buttonZone.getBoundingClientRect();
const yesRect=yesBtn.getBoundingClientRect();

const maxX=buttonZone.clientWidth-btnWidth;
const maxY=buttonZone.clientHeight-btnHeight-20;

let randomX,randomY,safe=false;

while(!safe){
randomX=Math.random()*maxX;
randomY=Math.random()*maxY;

const newLeft=zoneRect.left+randomX;
const newTop=zoneRect.top+randomY;

if(
newLeft+btnWidth<yesRect.left-10||
newLeft>yesRect.right+10||
newTop+btnHeight<yesRect.top-10||
newTop>yesRect.bottom+10
){
safe=true;
}
}

noBtn.style.left=randomX+"px";
noBtn.style.top=randomY+"px";
noBtn.style.bottom="auto";
noBtn.style.transform="none";

};


yesBtn.onclick=()=>{

clickSound.play().catch(()=>{});
bgm.play().catch(()=>{});

start.classList.add("hidden");
intro.classList.remove("hidden");

};


okBtn.onclick=()=>{

okSound.play().catch(()=>{});

intro.classList.add("hidden");
rules.classList.remove("hidden");

};


/* QUIZ */

let index=0;
let score=0;
let selected=null;

const answered=new Array(11).fill(false);


<!-- Question 1 -->
<p>1. Which action shows someone truly pays attention to you over time?</p>
<label><input type="radio" name="q1"> A) Replying quickly</label><br>
<label><input type="radio" name="q1"> B) Remembering small details about you</label><br>
<label><input type="radio" name="q1"> C) Sending messages daily</label><br>
<label><input type="radio" name="q1"> D) Liking your posts</label>


<br><br>

<!-- Question 2 -->
<p>2. When a person becomes quieter than usual, what is the most likely reason?</p>
<label><input type="radio" name="q2"> A) They are tired</label><br>
<label><input type="radio" name="q2"> B) They are thinking deeply</label><br>
<label><input type="radio" name="q2"> C) They are bored</label><br>
<label><input type="radio" name="q2"> D) They are distracted</label>


<br><br>

<!-- Question 3 -->
<p>3. Second letter of SUN + Last letter of MOON + First letter of STAR makes what?</p>
<label><input type="radio" name="q3"> A) URS</label><br>
<label><input type="radio" name="q3"> B) UNS</label><br>
<label><input type="radio" name="q3"> C) SNS</label><br>
<label><input type="radio" name="q3"> D) NNS</label>


<br><br>

<!-- Question 4 -->
<p>4. Which situation shows the strongest level of comfort between two people?</p>
<label><input type="radio" name="q4"> A) Talking for hours</label><br>
<label><input type="radio" name="q4"> B) Sharing secrets</label><br>
<label><input type="radio" name="q4"> C) Sitting silently without awkwardness</label><br>
<label><input type="radio" name="q4"> D) Sending long messages</label>


<br><br>

<!-- Question 5 -->
<p>5. What makes a person more memorable after meeting only a few times?</p>
<label><input type="radio" name="q5"> A) Expensive clothes</label><br>
<label><input type="radio" name="q5"> B) Unique behavior or habits</label><br>
<label><input type="radio" name="q5"> C) Height or looks</label><br>
<label><input type="radio" name="q5"> D) Their phone</label>


<br><br>

<!-- Question 6 -->
<p>6. If someone notices changes in your mood before you say anything, what does it most likely show?</p>
<label><input type="radio" name="q6"> A) Curiosity</label><br>
<label><input type="radio" name="q6"> B) Observation</label><br>
<label><input type="radio" name="q6"> C) Care and attention</label><br>
<label><input type="radio" name="q6"> D) Habit</label>


<br><br>

<!-- Question 7 -->
<p>7. Which thing usually becomes stronger only after a long time?</p>
<label><input type="radio" name="q7"> A) Interest</label><br>
<label><input type="radio" name="q7"> B) Trust</label><br>
<label><input type="radio" name="q7"> C) Attraction</label><br>
<label><input type="radio" name="q7"> D) Curiosity</label>


<br><br>

<!-- Question 8 -->
<p>8. When two people talk less but still stay close, what does it usually mean?</p>
<label><input type="radio" name="q8"> A) Boredom</label><br>
<label><input type="radio" name="q8"> B) Distance</label><br>
<label><input type="radio" name="q8"> C) Understanding</label><br>
<label><input type="radio" name="q8"> D) Habit</label>


<br><br>

<!-- Question 9 -->
<p>9. What makes a small moment stay in memory for a long time?</p>
<label><input type="radio" name="q9"> A) Music</label><br>
<label><input type="radio" name="q9"> B) Emotions felt in that moment</label><br>
<label><input type="radio" name="q9"> C) Time of day</label><br>
<label><input type="radio" name="q9"> D) Location</label>


<br><br>

<!-- Question 10 -->
<p>10. Which thing usually makes people feel closer without saying much?</p>
<label><input type="radio" name="q10"> A) Long chats</label><br>
<label><input type="radio" name="q10"> B) Shared experiences</label><br>
<label><input type="radio" name="q10"> C) Phone calls</label><br>
<label><input type="radio" name="q10"> D) Text messages</label>


<br><br>

<!-- Question 11 -->
<p>11. What usually reveals a person’s real nature the most?</p>
<label><input type="radio" name="q11"> A) First impression</label><br>
<label><input type="radio" name="q11"> B) Social media</label><br>
<label><input type="radio" name="q11"> C) Behavior over time</label><br>
<label><input type="radio" name="q11"> D) Appearance</label>
];

function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function startGame(){

rules.classList.add("hidden");
game.classList.remove("hidden");

loadQ();

}

function loadQ(){

selected=null;

question.innerText=questions[index].q;

options.innerHTML="";

shuffle([...questions[index].o]).forEach(op=>{

const b=document.createElement("button");

b.className="option";

b.innerText=op;

b.onclick=()=>{

selected=op;

document.querySelectorAll(".option")
.forEach(x=>x.classList.remove("active"));

b.classList.add("active");

};

options.appendChild(b);

});

}

nextBtn.onclick=()=>{

if(!selected)return;

if(!answered[index]){

if(selected===questions[index].a)
score++;

answered[index]=true;

}

index++;

index>=questions.length?endGame():loadQ();

};

prevBtn.onclick=()=>{
if(index>0){index--;loadQ();}
};

function endGame(){

game.classList.add("hidden");

result.classList.remove("hidden");

if(score>=7){

winAnimation();

result.innerHTML=
`
<h1>YOU WON</h1>
<p>You scored ${score} out of 11.</p>
<p>You won, now give me a dare and I will complete it.</p>
<button class="option" onclick="location.reload()">
Restart
</button>
`;

}
else{

loseAnimation();

result.innerHTML=
`
<h1>YOU LOST</h1>
<p>You scored ${score} out of 11.</p>
<button class="option" onclick="location.reload()">
Try Again
</button>
`;

}

}



function winAnimation(){

const layer=document.getElementById("particles");

for(let i=0;i<30;i++){

const p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=3+Math.random()*2+"s";

layer.appendChild(p);

setTimeout(()=>p.remove(),5000);

}

}


function loseAnimation(){

const layer=document.getElementById("particles");

for(let i=0;i<20;i++){

const p=document.createElement("div");

p.className="particle";

p.style.background="linear-gradient(#444,#111)";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration="4s";

layer.appendChild(p);

setTimeout(()=>p.remove(),5000);

}

}

</script>

</body>
</html>
